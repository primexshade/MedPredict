services:
  # ── Alembic migrations (init container — runs once then exits) ────────────────
  alembic-migrate:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: alembic upgrade head
    environment:
      DATABASE_URL: postgresql+asyncpg://dp_user:dp_password@postgres:5432/disease_prediction
      ENVIRONMENT: development
      MLFLOW_TRACKING_URI: file:///app/mlruns
      JWT_SECRET: local-dev-secret-change-in-prod
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # ── Backend API ───────────────────────────────────────────────────────────────
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://dp_user:dp_password@postgres:5432/disease_prediction
      REDIS_URL: redis://redis:6379/0
      MLFLOW_TRACKING_URI: file:///app/mlruns
      JWT_SECRET: local-dev-secret-change-in-prod
      ENVIRONMENT: development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      alembic-migrate:
        condition: service_completed_successfully
    volumes:
      - ../mlruns:/app/mlruns    # trained models from local training
      - ../data/raw:/app/data/raw
    restart: unless-stopped

  # ── Frontend ──────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "5173:5173"
    depends_on:
      - api

  # ── PostgreSQL ────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: disease_prediction
      POSTGRES_USER: dp_user
      POSTGRES_PASSWORD: dp_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dp_user -d disease_prediction"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru

volumes:
  postgres_data:
