# Render Blueprint — MedPredict Backend Deployment
# https://render.com/docs/blueprint-spec
# Deploy: Connect GitHub repo → Render Dashboard → "New Blueprint"

services:
  - type: web
    name: medpredict-api
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: medpredict-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: MLFLOW_TRACKING_URI
        value: file:///opt/render/project/src/mlruns
      - key: CORS_ORIGINS
        value: '["https://primexshade.github.io"]'
      - key: REDIS_URL
        value: ""
      - key: PYTHON_VERSION
        value: "3.11.11"

databases:
  - name: medpredict-db
    plan: free
    databaseName: medpredict
    user: medpredict_user
    region: oregon
